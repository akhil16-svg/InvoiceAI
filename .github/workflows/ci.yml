name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (all Python files)
        run: |
          python -m py_compile main.py
          for f in pages/*.py; do python -m py_compile "$f"; done
          for f in utils/*.py; do python -m py_compile "$f"; done

      - name: Import check
        run: |
          python -c "from utils import InvoiceParser, InvoiceDatabase, analytics; print('✅ All imports OK')"

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t invoice-ocr-app:test .

      - name: Verify Docker image
        run: docker images invoice-ocr-app:test
